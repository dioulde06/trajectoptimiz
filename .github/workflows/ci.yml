name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

defaults:
  run:
    shell: bash

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r typecheck

  test-unit:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r test

  test-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @trajectoptimiz/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter @trajectoptimiz/web test:e2e
        env:
          CI: true
          DATABASE_URL: postgresql://test:test@localhost:5432/trajectoptimiz_test
          ANTHROPIC_API_KEY: sk-ant-placeholder-for-ci
          NODE_ENV: test

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test-unit]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @trajectoptimiz/web build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder-for-build
          NEXT_PUBLIC_APP_URL: https://trajectoptimiz.vercel.app
