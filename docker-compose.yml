services:
  postgres:
    image: postgres:16-alpine
    container_name: trajectoptimiz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: trajectoptimiz
      POSTGRES_PASSWORD: trajectoptimiz_dev
      POSTGRES_DB: trajectoptimiz
    ports:
      - "5432:5432"
    volumes:
      # Persistance des données entre les redémarrages
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trajectoptimiz -d trajectoptimiz"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
